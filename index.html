<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="calculator.css">

    
<!-- Core CSS - Include with every page -->
<link href="assets/plugins/bootstrap/bootstrap.css" rel="stylesheet" />
<link href="assets/font-awesome/css/font-awesome.css" rel="stylesheet" />
<link href="assets/plugins/pace/pace-theme-big-counter.css" rel="stylesheet" />
<link href="assets/css/style.css" rel="stylesheet" />
<link href="assets/css/main-style.css" rel="stylesheet" />
<!-- Page-Level CSS -->
<link href="assets/plugins/morris/morris-0.4.3.min.css" rel="stylesheet" />
</head>
<body>
    

<div class="container-fluid">
    <div class="row">
   
    <input type="text" id="result" readonly>
<div class="col-md-4 col-lg-6 col-sm-3">
    <div class="container">
    <!-- <input type="text" id="result" readonly> -->
    <button class="but" onclick="appendOperator('-')">-</button>&nbsp;
    <button class="but" onclick="appendOperator('*')">*</button>&nbsp;
    <button class="but" onclick="appendOperator('/')">/</button>&nbsp;
    <button class="but" onclick="appendOperator('+')">+</button><br><p></p>
<button class="a7" onclick="appendValue('1')">1</button>&nbsp;
<button class="a8" onclick="appendValue('2')">2</button>&nbsp;
<button class="a9" onclick="appendValue('3')">3</button>&nbsp;
<button class="but" onclick="appendValue('.')">.</button><br><p></p>
<button  class="a4" onclick="appendValue('4')">4</button>&nbsp;
<button class="a5" onclick="appendValue('5')">5</button>&nbsp;
<button class="a6" onclick="appendValue('6')">6</button>&nbsp;
<button class="but" onclick="appendOperator('%')">%</button><br><p></p>
<button class="a1" onclick="appendValue('7')">7</button> &nbsp;
<button class="a2" onclick="appendValue('8')">8</button>&nbsp;
<button class="a3" onclick="appendValue('9')">9</button>&nbsp; 
<button class="but" onclick="calculate()">=</button><br><p></p>
<button class="but" onclick="clearResult()">AC</button>&nbsp;
<button class="a0" onclick="appendValue('0')">0</button>&nbsp;
<button class="but" onclick="deleteResult()">DEL</button>&nbsp;
<button class="but" onclick="appendOperator('+⁄-')">+⁄-</button>

</div>




<script>

    function appendValue(value){
        document.getElementById('result').value += value;
    }

    function clearResult(){
        document.getElementById('result').value = '';
    }

    function deleteResult(){
        document.getElementById('delete').value = '';
    }

    function calculate(){
        var result =
        eval( document.getElementById('result').value);
        document.getElementById('result').value = result;
    }

    function calculate(){
        var result=
        document.getElementById("result");
        var expression=result.value;
        var answer=eval(expression);

        
        result.value=answer;
    }

    function clearResult(){
        document.getElementById("result").value="";
    }

    function appendOperator(operator){
        var result=
        document.getElementById("result");
        result.value +=operator;
    }

   
</script>
</div>
<div class="col-md-4 col-sm-3" >

</div>
<div class="col-md-4 col-lg-6 col-sm-3">

</div>
<div class="col-sm-3">

</div>
</div>
</div>

</body>
</html>
